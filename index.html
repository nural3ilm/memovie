<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MémoVie - Vos Souvenirs Précieux</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%); color: #3a3a3a; min-height: 100vh; padding: 20px; }
        .login-screen { display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%); z-index: 9999; }
        .login-screen.hidden { display: none !important; }
        .login-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); max-width: 400px; width: 90%; text-align: center; }
        .login-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .login-title { font-family: 'Crimson Text', serif; font-size: 2.5rem; color: #8b6f47; margin-bottom: 10px; font-style: italic; }
        .login-subtitle { color: #a89070; margin-bottom: 30px; font-size: 1rem; }
        .login-input { width: 100%; padding: 14px; font-size: 1rem; border: 2px solid #e0d0bf; border-radius: 10px; margin-bottom: 15px; }
        .login-input:focus { outline: none; border-color: #c9a961; }
        .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #c9a961 0%, #b8956a 100%); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .login-error { color: #e74c3c; margin-top: 15px; display: none; }
        .login-error.show { display: block; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Crimson Text', serif; font-size: 3.5rem; color: #8b6f47; margin-bottom: 10px; font-style: italic; }
        .tagline { font-size: 1.2rem; color: #a89070; }
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 16px 32px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; background: rgba(255,255,255,0.6); color: #8b6f47; }
        .tab-btn.active { background: linear-gradient(135deg, #c9a961 0%, #b8956a 100%); color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .form-container { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 1.1rem; font-weight: 600; color: #5a5a5a; margin-bottom: 10px; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 14px; font-size: 1rem; border: 2px solid #e0d0bf; border-radius: 12px; font-family: 'Poppins', sans-serif; background: #fafafa; }
        textarea { min-height: 80px; resize: vertical; }
        .audio-control { display: flex; gap: 12px; margin-bottom: 20px; }
        .record-btn { flex: 1; padding: 16px; font-size: 1rem; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; background: #e74c3c; color: white; }
        .record-btn.recording { background: #27ae60; }
        .stop-btn { flex: 1; padding: 16px; background: #95a5a6; color: white; border: none; border-radius: 12px; cursor: pointer; }
        .audio-preview { margin-top: 15px; padding: 15px; background: #f0f0f0; border-radius: 12px; display: none; }
        .audio-preview.active { display: block; }
        .audio-preview audio { width: 100%; margin-bottom: 10px; }
        .btn-primary { width: 100%; padding: 18px; font-size: 1.15rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, #c9a961 0%, #b8956a 100%); color: white; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px 0; }
        .memory-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .memory-date { font-size: 0.85rem; color: #a89070; margin-bottom: 8px; }
        .memory-title { font-family: 'Crimson Text', serif; font-size: 1.4rem; color: #8b6f47; margin-bottom: 12px; }
        .memory-controls { display: flex; gap: 8px; margin-top: 15px; }
        .btn-small { flex: 1; padding: 10px; font-size: 0.9rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-play { background: #3498db; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .empty-state { text-align: center; padding: 60px 20px; color: #a89070; }
        .empty-icon { font-size: 3rem; margin-bottom: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; max-width: 600px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { font-family: 'Crimson Text', serif; font-size: 2rem; color: #8b6f47; margin-bottom: 20px; }
        .modal-audio { width: 100%; margin-bottom: 20px; }
        .modal-close { width: 100%; padding: 12px; background: #95a5a6; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; right: 30px; background: #27ae60; color: white; padding: 16px 24px; border-radius: 12px; z-index: 2000; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 16px; text-align: center; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        .stat-number { font-family: 'Crimson Text', serif; font-size: 2.5rem; color: #c9a961; }
        .stat-label { color: #a89070; font-size: 0.95rem; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-icon">🌸</div>
            <div class="login-title">MémoVie</div>
            <div class="login-subtitle">Entrez votre clé d'accès</div>
            <input type="password" id="pwInput" placeholder="Clé d'accès" onkeypress="if(event.key==='Enter') verifyPassword()">
            <button onclick="verifyPassword()" class="login-btn">Accéder</button>
            <div class="login-error" id="pwError">❌ Clé incorrecte</div>
        </div>
    </div>

    <div class="container" id="appContent" style="display: none;">
        <header>
            <h1>🌸 MémoVie</h1>
            <p class="tagline">Vos souvenirs précieux, conservés à jamais</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('record')">➕ Enregistrer</button>
            <button class="tab-btn" onclick="switchTab('gallery')">📚 Mes Souvenirs</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 Stats</button>
        </div>

        <div id="record" class="section active">
            <div class="form-container">
                <div class="form-group">
                    <label>Titre du souvenir</label>
                    <input type="text" id="memoryTitle" placeholder="Ex: Mon mariage">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="memoryDate">
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <input type="text" id="memoryCategory" placeholder="Ex: Famille">
                </div>
                <div class="form-group">
                    <label>Enregistrement vocal</label>
                    <div class="audio-control">
                        <button class="record-btn" id="recordBtn" onclick="startRecording()">🎙️ Enregistrer</button>
                        <button class="stop-btn" id="stopBtn" onclick="stopRecording()" disabled>⏹️ Arrêter</button>
                    </div>
                    <div class="audio-preview" id="audioPreview">
                        <audio id="audioPlayback" controls></audio>
                    </div>
                </div>
                <button class="btn-primary" onclick="saveMemory()">💾 Sauvegarder</button>
            </div>
        </div>

        <div id="gallery" class="section">
            <div id="galleryContainer"></div>
        </div>

        <div id="stats" class="section">
            <div class="stats">
                <div class="stat-card"><div class="stat-number" id="totalMemories">0</div><div class="stat-label">Souvenirs</div></div>
                <div class="stat-card"><div class="stat-number" id="totalHours">0h</div><div class="stat-label">Temps total</div></div>
                <div class="stat-card"><div class="stat-number" id="oldestYear">-</div><div class="stat-label">Plus ancien</div></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle"></div>
            <audio id="modalAudio" controls class="modal-audio"></audio>
            <button class="modal-close" onclick="closeModal()">Fermer</button>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'memovie2024';
        let mediaRecorder, audioChunks = [], currentMemoryAudio = null;

        function verifyPassword() {
            const input = document.getElementById('pwInput').value;
            if (input === CORRECT_PASSWORD) {
                sessionStorage.setItem('memovie_auth', 'true');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').style.display = 'block';
                init();
            } else {
                document.getElementById('pwError').classList.add('show');
                document.getElementById('pwInput').value = '';
                setTimeout(() => document.getElementById('pwError').classList.remove('show'), 3000);
            }
        }

        window.addEventListener('load', () => {
            if (sessionStorage.getItem('memovie_auth') === 'true') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appContent').style.display = 'block';
                init();
            } else {
                document.getElementById('pwInput').focus();
            }
        });

        function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('memoryDate').value = today;
            loadMemories();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            if (tabName === 'gallery') loadMemories();
            if (tabName === 'stats') updateStats();
        }

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                document.getElementById('audioPlayback').src = url;
                document.getElementById('audioPreview').classList.add('active');
                currentMemoryAudio = blob;
            };
            mediaRecorder.start();
            document.getElementById('recordBtn').classList.add('recording');
            document.getElementById('recordBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('recordBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        function saveMemory() {
            const title = document.getElementById('memoryTitle').value.trim();
            const date = document.getElementById('memoryDate').value;
            const category = document.getElementById('memoryCategory').value.trim();
            if (!title || !date || !currentMemoryAudio) {
                alert('Remplissez tous les champs et enregistrez un audio');
                return;
            }
            const reader = new FileReader();
            reader.onload = () => {
                const memories = JSON.parse(localStorage.getItem('memories') || '[]');
                memories.push({ id: Date.now(), title, date, category, audio: reader.result, createdAt: new Date().toISOString() });
                localStorage.setItem('memories', JSON.stringify(memories));
                showToast('Souvenir enregistré !');
                resetForm();
            };
            reader.readAsDataURL(currentMemoryAudio);
        }

        function resetForm() {
            document.getElementById('memoryTitle').value = '';
            document.getElementById('memoryCategory').value = '';
            document.getElementById('audioPreview').classList.remove('active');
            currentMemoryAudio = null;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('memoryDate').value = today;
        }

        function loadMemories() {
            const memories = JSON.parse(localStorage.getItem('memories') || '[]');
            const container = document.getElementById('galleryContainer');
            if (memories.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><h2>Aucun souvenir</h2></div>';
                return;
            }
            const sorted = [...memories].sort((a, b) => new Date(b.date) - new Date(a.date));
            container.innerHTML = sorted.map(m => `<div class="memory-card"><div class="memory-date">${new Date(m.date).toLocaleDateString('fr-FR')}</div><div class="memory-title">${m.title}</div><div style="font-size:0.9rem;color:#a89070;">📁 ${m.category}</div><div class="memory-controls"><button class="btn-small btn-play" onclick="openMemory(${m.id})">▶️ Écouter</button><button class="btn-small btn-delete" onclick="deleteMemory(${m.id})">🗑️ Supprimer</button></div></div>`).join('');
        }

        function openMemory(id) {
            const memories = JSON.parse(localStorage.getItem('memories') || '[]');
            const memory = memories.find(m => m.id === id);
            if (!memory) return;
            document.getElementById('modalTitle').textContent = memory.title;
            document.getElementById('modalAudio').src = memory.audio;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('modalAudio').pause();
        }

        function deleteMemory(id) {
            if (!confirm('Supprimer ce souvenir ?')) return;
            let memories = JSON.parse(localStorage.getItem('memories') || '[]');
            memories = memories.filter(m => m.id !== id);
            localStorage.setItem('memories', JSON.stringify(memories));
            loadMemories();
            showToast('Souvenir supprimé');
        }

        function updateStats() {
            const memories = JSON.parse(localStorage.getItem('memories') || '[]');
            document.getElementById('totalMemories').textContent = memories.length;
            if (memories.length > 0) {
                const years = memories.map(m => new Date(m.date).getFullYear());
                document.getElementById('oldestYear').textContent = Math.min(...years);
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
